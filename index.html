<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ESSENCE OMNIVERSE | SMOOTH EXPERIENCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #000000;
            --accent: #c5a059;
            --bg: #ffffff;
            --card-bg: #f8f9fa;
            --radius: 24px;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --smooth: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: 'Montserrat', sans-serif; color: var(--primary); overflow-x: hidden; }

        /* HEADER ESTILO APP */
        header {
            padding: 30px 20px;
            text-align: center;
            background: var(--bg);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: 5px; text-transform: uppercase; }

        /* ANUNCIO DISCRETO */
        .top-bar { background: var(--accent); color: #fff; text-align: center; padding: 8px; font-size: 0.6rem; font-weight: 700; letter-spacing: 2px; }

        /* BUSCADOR SMOOTH */
        .search-container { padding: 0 20px; margin-bottom: 20px; }
        .search-bar {
            width: 100%;
            padding: 18px 25px;
            background: var(--card-bg);
            border: none;
            border-radius: var(--radius);
            font-size: 0.9rem;
            outline: none;
            transition: var(--smooth);
            border: 1px solid transparent;
        }
        .search-bar:focus { background: #fff; border-color: var(--accent); box-shadow: var(--shadow); }

        /* GRID DE PRODUCTOS ESTILO BIRRIAPP */
        .container { padding: 0 20px 100px; max-width: 1200px; margin: 0 auto; display: none; }
        .container.active { display: block; animation: slideUp 0.6s ease; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 30px; } }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 15px;
            text-align: center;
            transition: var(--smooth);
            position: relative;
            border: 1px solid rgba(0,0,0,0.03);
        }
        .card:active { transform: scale(0.95); }
        .card img { width: 100%; aspect-ratio: 1; object-fit: contain; margin-bottom: 10px; transition: var(--smooth); }
        .card h3 { font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; }
        .card p { font-size: 1rem; font-weight: 300; color: var(--accent); margin-bottom: 15px; }

        .btn-buy {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        /* NAVEGACIÓN INFERIOR (ESTILO BIRRIAPP) */
        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            padding: 15px;
            border-radius: 30px;
            display: flex;
            justify-content: space-around;
            z-index: 5000;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .nav-item { color: #fff; text-decoration: none; font-size: 0.6rem; font-weight: 700; opacity: 0.5; transition: 0.3s; background: none; border: none; cursor: pointer; text-transform: uppercase; }
        .nav-item.active { opacity: 1; color: var(--accent); }

        /* MODALES SMOOTH */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
            z-index: 10000;
            align-items: flex-end;
        }
        .modal-content {
            background: #fff;
            width: 100%;
            border-radius: 30px 30px 0 0;
            padding: 40px 20px;
            animation: sheetUp 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        @keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .method-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 10px;
            font-weight: 700;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .method-card:active { background: var(--accent); color: #fff; }

        .fab-add { position: fixed; top: 20px; right: 20px; width: 50px; height: 50px; background: var(--primary); color: #fff; border-radius: 50%; display: none; align-items: center; justify-content: center; z-index: 6000; border: 2px solid var(--accent); }
    </style>
</head>
<body>

    <div class="top-bar">PRODUCTOS 100% ORIGINALES • PANAMÁ</div>

    <header><div class="logo" id="boss-trigger">ESSENCE</div></header>

    <div class="search-container">
        <input type="text" id="main-search" class="search-bar" placeholder="Busca tu perfume favorito..." onkeyup="filter()">
    </div>

    <main>
        <section id="shop" class="container active"><div class="grid" id="product-list"></div></section>
        
        <section id="trace" class="container">
            <div style="text-align:center; padding-top: 50px;">
                <h2 style="margin-bottom:20px">RASTREO DE PEDIDO</h2>
                <input type="text" id="trace-name" class="search-bar" placeholder="Ingresa tu nombre..." style="text-align:center">
                <button class="btn-buy" style="margin-top:20px; height:60px" onclick="track()">Consultar WhatsApp</button>
            </div>
        </section>

        <section id="admin" class="container">
            <h2 style="margin-bottom:20px">ADMIN DASHBOARD</h2>
            <div id="admin-items"></div>
        </section>
    </main>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="changeTab('shop', this)">Tienda</button>
        <button class="nav-item" onclick="changeTab('trace', this)">Rastreo</button>
        <button class="nav-item" id="admin-tab" style="display:none" onclick="changeTab('admin', this)">Panel</button>
    </div>

    <div class="modal" id="pay-modal">
        <div class="modal-content">
            <h3 style="text-align:center; margin-bottom:30px">SELECCIONA PAGO</h3>
            <div class="method-card" onclick="complete('YAPPY')">YAPPY</div>
            <div class="method-card" onclick="complete('ACH')">TRANSFERENCIA</div>
            <div class="method-card" onclick="complete('EFECTIVO')">EFECTIVO</div>
            <button class="btn-buy" style="background:#eee; color:#000; margin-top:10px" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <button class="fab-add" id="fab" onclick="addOne()">+</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyBkNAkJXoyxn9rkGv1mG5GPh9ge4FUjp8Y",
            authDomain: "essencev2.firebaseapp.com",
            projectId: "essencev2",
            storageBucket: "essencev2.firebasestorage.app",
            messagingSenderId: "201967001425",
            appId: "1:201967001425:web:0a072cd4d2048e7a0dbd70"
        };

        const app = initializeApp(config);
        const db = getFirestore(app);
        const WHATSAPP = "50769028805";
        let selP = ""; let selV = "";

        // CARGA DE PRODUCTOS
        onSnapshot(collection(db, "inventario_oficial"), (snap) => {
            const grid = document.getElementById('product-list');
            const adm = document.getElementById('admin-items');
            grid.innerHTML = ""; adm.innerHTML = "";
            snap.forEach(d => {
                const item = d.data();
                grid.innerHTML += `
                    <div class="card" data-name="${item.name.toLowerCase()}">
                        <img src="${item.img}">
                        <h3>${item.name}</h3>
                        <p>$${item.price}</p>
                        <button class="btn-buy" onclick="initPay('${item.name}', '${item.price}')">Comprar</button>
                    </div>`;
                adm.innerHTML += `<div style="background:#f4f4f4; padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between">
                    <span>${item.name}</span><button onclick="removeItem('${d.id}')" style="color:red; border:none; background:none; font-weight:700">X</button>
                </div>`;
            });
        });

        // LÓGICA DE PAGO (ANTI-BLOQUEO IPHONE)
        window.initPay = (n, v) => { selP = n; selV = v; document.getElementById('pay-modal').style.display = 'flex'; };
        window.closeModal = () => document.getElementById('pay-modal').style.display = 'none';

        window.complete = async (metodo) => {
            const user = localStorage.getItem('e_user') || prompt("Tu nombre completo:");
            if(!user) return;
            const msg = `👑 *ORDEN ESSENCE*%0A👤 *Cliente:* ${user}%0A📦 *Perfume:* ${selP}%0A💰 *Precio:* $${selV}%0A💳 *Pago:* ${metodo}`;
            const url = `https://wa.me/${WHATSAPP}?text=${msg}`;
            const win = window.open(url, '_blank');
            if(!win) window.location.href = url;
            await addDoc(collection(db, "ventas_essence"), { user, perfume: selP, metodo, ts: new Date() });
            closeModal();
        };

        // NAVEGACIÓN
        window.changeTab = (id, btn) => {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
        };

        window.filter = () => {
            const val = document.getElementById('main-search').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => c.style.display = c.dataset.name.includes(val) ? "block" : "none");
        };

        window.track = () => {
            const n = document.getElementById('trace-name').value;
            if(n) window.open(`https://wa.me/${WHATSAPP}?text=Rastreo%20de%20pedido%20para:%20${n}`);
        };

        // ADMIN TOOLS
        window.removeItem = (id) => confirm("¿Borrar?") && deleteDoc(doc(db, "inventario_oficial", id));
        window.addOne = async () => {
            const name = prompt("Nombre:"), price = prompt("Precio:"), img = prompt("URL Imagen:");
            if(name && price && img) await addDoc(collection(db, "inventario_oficial"), { name, price, img });
        };

        let clicks = 0;
        document.getElementById('boss-trigger').onclick = () => {
            if(++clicks >= 3) {
                if(prompt("PASSWORD:") === "542497") {
                    document.getElementById('admin-tab').style.display = 'block';
                    document.getElementById('fab').style.display = 'flex';
                }
                clicks = 0;
            }
        };
    </script>
</body>
</html>
            }
        };

        window.onload = () => {
            const u = localStorage.getItem('e_user');
            if(u) document.getElementById('u-name').innerText = "CLIENTE: " + u.toUpperCase();
        };
    </script>
</body>
</html>
