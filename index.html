<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ESSENCE | Perfumes Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff2d2d;
            --secondary: #ff6b6b;
            --accent: #25d366;
            --bg: #f8f9fa;
            --text: #222;
            --radius: 22px;
            --shadow: 0 6px 32px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Montserrat', sans-serif; color: var(--text); }
        header {
            background: #fff; padding: 22px 0 18px 0; box-shadow: 0 2px 16px rgba(0,0,0,0.04);
            display: flex; flex-direction: column; align-items: center; position: sticky; top: 0; z-index: 1000;
        }
        .logo {
            font-weight: 900; font-size: 2rem; letter-spacing: 7px; color: var(--primary); text-shadow: 0 2px 8px #ffb3b3;
        }
        .subtitle {
            font-size: 1rem; color: #888; margin-top: 2px; letter-spacing: 2px;
        }
        .main-banner {
            background: linear-gradient(120deg, var(--primary), var(--secondary));
            color: #fff; border-radius: var(--radius); padding: 38px 24px 32px 24px; margin: 28px auto 18px auto;
            max-width: 500px; box-shadow: var(--shadow); text-align: center; position: relative;
        }
        .main-banner h1 { font-size: 2.1rem; font-weight: 900; margin-bottom: 8px; }
        .main-banner p { font-size: 1.1rem; font-weight: 500; }
        .main-banner .promo {
            background: #fff; color: var(--primary); font-weight: 800; border-radius: 12px;
            display: inline-block; padding: 8px 22px; margin-top: 18px; font-size: 1.2rem; box-shadow: 0 2px 12px #ffb3b3;
        }
        .categories {
            display: flex; gap: 12px; justify-content: center; margin: 30px 0 18px 0;
        }
        .category {
            background: #fff; border-radius: 16px; padding: 12px 22px; font-weight: 700;
            color: var(--primary); box-shadow: 0 2px 10px #ffb3b3; cursor: pointer; transition: background 0.2s;
        }
        .category.active, .category:hover { background: var(--primary); color: #fff; }
        .search-box { margin: 0 auto 28px auto; max-width: 500px; }
        .search-input {
            width: 100%; padding: 16px 22px; border: 1px solid #eee; border-radius: 16px;
            background: #fff; font-size: 1rem; outline: none; box-shadow: var(--shadow);
            transition: 0.3s;
        }
        .search-input:focus { border-color: var(--primary); }
        .products-section { max-width: 500px; margin: 0 auto; }
        .section-title {
            font-size: 1.1rem; color: #888; letter-spacing: 1px; margin: 30px 0 12px 0; text-transform: uppercase;
        }
        .product-card {
            background: #fff; border-radius: var(--radius); padding: 22px; margin-bottom: 22px;
            box-shadow: var(--shadow); border: 1px solid rgba(0,0,0,0.02); display: flex; gap: 18px;
            align-items: center; transition: transform 0.2s;
        }
        .product-card:active { transform: scale(0.98); }
        .product-image { width: 90px; height: 90px; object-fit: contain; border-radius: 12px; background: #f3f3f3; }
        .product-info { flex: 1; }
        .product-info h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 6px; color: #000; }
        .product-desc { font-size: 0.9rem; color: #666; margin-bottom: 8px; }
        .product-price { font-size: 1.3rem; font-weight: 900; color: var(--primary); margin-bottom: 10px; display: block; }
        .btn-toy {
            background: var(--primary); color: #fff; border: none; padding: 14px;
            border-radius: 12px; font-size: 1rem; font-weight: 800; width: 100%;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 45, 45, 0.3); margin-top: 8px;
        }
        .btn-toy:active { background: var(--secondary); }
        .nav-dock {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 420px; background: #fff; border-radius: 100px;
            padding: 10px; display: flex; justify-content: space-around;
            box-shadow: 0 10px 40px rgba(0,0,0,0.12); border: 1px solid #f0f0f0;
        }
        .nav-item {
            padding: 14px 28px; border-radius: 50px; border: none; background: transparent;
            font-size: 0.8rem; font-weight: 800; color: #a0a0a0; text-transform: uppercase;
        }
        .nav-item.active { background: #f0f0f0; color: #000; }
        .footer {
            background: #fff; color: #888; text-align: center; padding: 28px 0 18px 0; font-size: 0.9rem;
            margin-top: 60px; border-radius: 22px 22px 0 0; box-shadow: 0 -2px 16px rgba(0,0,0,0.04);
        }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(8px); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal.open { display: flex; }
        .modal-content { background: #fff; width: 100%; max-width: 350px; border-radius: 24px; padding: 30px; text-align: center; }
        @media (max-width: 600px) {
            .main-banner { padding: 28px 10px 22px 10px; }
            .products-section, .search-box { padding: 0 4px; }
            .footer { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">ESSENCE</div>
        <div class="subtitle">Perfumes Premium 2026</div>
    </header>
    <div class="main-banner">
        <h1>¡Fragancias que Enamoran!</h1>
        <p>Descubre las mejores esencias, calidad premium y ofertas exclusivas.</p>
        <div class="promo">2 x $120.00</div>
    </div>
    <div class="categories">
        <div class="category active">Todos</div>
        <div class="category">Dama</div>
        <div class="category">Caballero</div>
        <div class="category">Unisex</div>
    </div>
    <div class="search-box">
        <input type="text" class="search-input" id="search" placeholder="Busca tu perfume..." onkeyup="filter()">
    </div>
    <div class="products-section">
        <div class="section-title">Destacados</div>
        <div id="product-list"></div>
    </div>
    <nav class="nav-dock">
        <button class="nav-item active">Inicio</button>
        <button class="nav-item">Rastreo</button>
    </nav>
    <div class="modal" id="p-modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">¿Cómo quieres pagar?</h3>
            <button class="btn-toy" style="background:#000; margin-bottom:10px;" onclick="pay('YAPPY')">YAPPY</button>
            <button class="btn-toy" style="background:#eee; color:#000; box-shadow:none;" onclick="closeM()">CANCELAR</button>
        </div>
    </div>
    <footer class="footer">
        © 2026 ESSENCE. Todos los derechos reservados. | Inspirado en Birriapp
    </footer>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
        const config = {
            apiKey: "AIzaSyBkNAkJXoyxn9rkGv1mG5GPh9ge4FUjp8Y",
            authDomain: "essencev2.firebaseapp.com",
            projectId: "essencev2",
            storageBucket: "essencev2.firebasestorage.app",
            messagingSenderId: "201967001425",
            appId: "1:201967001425:web:0a072cd4d2048e7a0dbd70"
        };
        const app = initializeApp(config);
        const db = getFirestore(app);
        let currentN = "", currentP = "";
        onSnapshot(collection(db, "inventario_oficial"), (snap) => {
            const list = document.getElementById('product-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const i = doc.data();
                list.innerHTML += `
                    <div class="product-card" data-name="${i.name.toLowerCase()}" data-cat="${i.cat || ''}">
                        <img src="${i.img}" class="product-image">
                        <div class="product-info">
                            <h3>${i.name}</h3>
                            <div class="product-desc">${i.desc || ''}</div>
                            <span class="product-price">$${i.price}</span>
                            <button class="btn-toy" onclick="openM('${i.name}', '${i.price}')">¡LO QUIERO!</button>
                        </div>
                    </div>`;
            });
        });
        window.openM = (n, p) => { currentN = n; currentP = p; document.getElementById('p-modal').classList.add('open'); };
        window.closeM = () => document.getElementById('p-modal').classList.remove('open');
        window.pay = async (m) => {
            const u = prompt("Dinos tu nombre para la orden:");
            if(!u) return;
            window.open(`https://wa.me/50769028805?text=Orden:%20${currentN}%20|%20Pago:%20${m}`);
            await addDoc(collection(db, "ventas_essence"), { cliente: u, perfume: currentN, pago: m, fecha: new Date() });
            closeM();
        };
        window.filter = () => {
            const v = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.product-card').forEach(c => {
                c.style.display = c.dataset.name.includes(v) ? "flex" : "none";
            });
        };
        // Categoría filtro (solo UI, requiere que los productos tengan data-cat)
        document.querySelectorAll('.category').forEach(cat => {
            cat.addEventListener('click', function() {
                document.querySelectorAll('.category').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                const catName = this.textContent.trim().toLowerCase();
                document.querySelectorAll('.product-card').forEach(card => {
                    if(catName === 'todos' || (card.dataset.cat && card.dataset.cat.toLowerCase() === catName)) {
                        card.style.display = 'flex';
                    } else {
                        card.style.display = 'none';
                    }
                });
            });
        });
    </script>
