<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ESSENCE OMNIVERSE | CINEMATIC EXPERIENCE</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Montserrat:wght@100;300;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* [LÍNEA 20] EL MOTOR DE SEDA (ANIMACIONES RELAJADAS) */
        :root {
            --primary: #000000;
            --accent: #c5a059;
            --bg: #ffffff;
            --gray: #f8f9fa;
            --v-smooth: all 0.8s cubic-bezier(0.19, 1, 0.22, 1); /* Pura Seda */
            --Cinzel: 'Cinzel', serif;
            --Montserrat: 'Montserrat', sans-serif;
            --shadow: 0 30px 60px rgba(0,0,0,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); font-family: var(--Montserrat); color: var(--primary); overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* [LÍNEA 40] SPLASH SCREEN (INTRO ÉPICA AL CARGAR) */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 100000;
            display: flex; align-items: center; justify-content: center;
            animation: splashOut 1.5s ease 2.5s forwards;
        }
        #splash .logo-intro { font-family: var(--Cinzel); font-size: 2.5rem; letter-spacing: 20px; text-transform: uppercase; animation: introFade 2s; }
        @keyframes introFade { from { opacity: 0; letter-spacing: 50px; } to { opacity: 1; letter-spacing: 20px; } }
        @keyframes splashOut { to { opacity: 0; visibility: hidden; } }

        /* [LÍNEA 60] HEADER ÉPICO */
        header { padding: 80px 30px 40px; text-align: center; background: var(--bg); position: relative; z-index: 1000; }
        .logo { font-family: var(--Cinzel); font-size: 2.8rem; letter-spacing: 15px; text-transform: uppercase; cursor: pointer; transition: var(--v-smooth); }
        .logo:hover { letter-spacing: 20px; color: var(--accent); }

        /* BUSCADOR CON BACKDROP BLUR (CRISTAL) */
        .search-area { max-width: 600px; margin: 40px auto; padding: 0 20px; position: sticky; top: 30px; z-index: 5000; transition: var(--v-smooth); }
        .search-area:focus-within { top: 10px; }
        .search-bar {
            width: 100%; padding: 22px 35px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            border: none; border-radius: 50px;
            font-size: 0.9rem; text-align: center; letter-spacing: 2px;
            outline: none; transition: var(--v-smooth);
            border: 1px solid rgba(0,0,0,0.05);
        }
        .search-bar:focus { background: #fff; border-color: var(--accent); box-shadow: var(--shadow); width: 105%; }

        /* [LÍNEA 100] GRID Y CARDS CON EFECTO DE CASCADA ÉPICO */
        .container { padding: 60px 20px 150px; max-width: 1400px; margin: 0 auto; display: none; }
        .container.active { display: block; animation: sectionFadeIn 1s cubic-bezier(0.19, 1, 0.22, 1); }
        @keyframes sectionFadeIn { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px 20px; }
        @media (min-width: 768px) { .grid { grid-template-columns: repeat(4, 1fr); gap: 60px 40px; } }

        /* EL EFECTO SMOOTH DE LAS CARDS */
        .card {
            background: var(--bg);
            border-radius: 4px; /* Minimalismo puro, sin bordes redondos exagerados */
            padding: 20px; text-align: center;
            transition: var(--v-smooth);
            position: relative; overflow: hidden;
            animation: cardAppear 0.8s cubic-bezier(0.19, 1, 0.22, 1) backwards;
        }
        .card:hover { transform: translateY(-10px); }
        @keyframes cardAppear { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        /* Efecto de cascada para los primeros 8 productos */
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }
        .card:nth-child(6) { animation-delay: 0.6s; }
        .card:nth-child(7) { animation-delay: 0.7s; }
        .card:nth-child(8) { animation-delay: 0.8s; }

        .card-visuals { background: var(--gray); aspect-ratio: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 2px; margin-bottom: 25px; }
        .card img { width: 85%; height: 85%; object-fit: contain; transition: 1.5s cubic-bezier(0.1, 1, 0.2, 1); }
        .card:hover img { transform: scale(1.1); }

        .card h3 { font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .card p { font-size: 1.2rem; font-weight: 100; color: #555; margin-bottom: 25px; }

        /* [LÍNEA 160] BOTÓN CORPORATIVO */
        .btn-acquire {
            width: 100%; padding: 22px;
            background: var(--primary); color: #fff;
            border: none; border-radius: 2px;
            font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 4px;
            cursor: pointer; transition: var(--v-smooth);
        }
        .btn-acquire:hover { background: var(--accent); box-shadow: 0 15px 30px rgba(197,160,89,0.3); }

        /* [LÍNEA 180] NAVEGACIÓN INFERIOR (FLOTANTE ÉPICA) */
        .nav-flotante {
            position: fixed; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 450px;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(25px);
            padding: 10px; border-radius: 60px;
            display: flex; justify-content: space-around;
            z-index: 6000;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            transition: var(--v-smooth);
        }
        .nav-flotante:hover { bottom: 45px; }
        
        .nav-item {
            color: #fff; text-decoration: none;
            font-size: 0.7rem; font-weight: 900; text-transform: uppercase;
            letter-spacing: 2px; padding: 15px 20px;
            border-radius: 30px; transition: 0.3s;
            background: none; border: none; cursor: pointer;
            opacity: 0.6;
        }
        .nav-item.active { opacity: 1; background: rgba(255,255,255,0.1); color: var(--accent); }

        /* [LÍNEA 220] MODAL "BOTTOM SHEET" (EL EFECTO BIRRIAPP/IPHONE) */
        .modal {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
            z-index: 20000;
            align-items: flex-end; /* Efecto iPhone */
            transition: var(--v-smooth);
        }
        .modal-inner {
            background: #fff;
            width: 100%;
            border-radius: 30px 30px 0 0;
            padding: 50px 30px;
            text-align: center;
            animation: modalSheetIn 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }
        @keyframes modalSheetIn { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .method-luxe {
            width: 100%; padding: 25px;
            background: var(--gray);
            border-radius: 12px;
            margin-bottom: 20px;
            font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer; transition: 0.3s;
            border: 1px solid transparent;
        }
        .method-luxe:active { transform: scale(0.95); background: var(--accent); color: #fff; border-color: var(--accent); }

        /* ADMIN TOOLS */
        .fab-master {
            position: fixed; bottom: 120px; right: 30px;
            width: 70px; height: 70px; background: #000; color: #fff;
            border-radius: 50%; display: none; align-items: center; justify-content: center;
            font-size: 2rem; border: 2px solid var(--accent); z-index: 15000; cursor: pointer;
            box-shadow: var(--shadow); transition: 0.4s;
        }
        .fab-master:hover { transform: scale(1.1) rotate(90deg); }

    </style>
</head>
<body>

    <div id="splash">
        <div class="logo-intro">ESSENCE</div>
    </div>

    <header><div class="logo" id="boss-trigger">ESSENCE</div></header>

    <div class="search-area">
        <input type="text" id="engine" class="search-bar" placeholder="DESCUBRE TU ESENCIA..." onkeyup="filterSystem()">
    </div>

    <main>
        <section id="shop" class="container active"><div class="grid" id="main-injector"></div></section>
        
        <section id="trace" class="container">
            <div style="text-align:center; padding-top: 60px;">
                <h2 style="font-family:var(--Cinzel); letter-spacing:10px; margin-bottom:30px">RASTREO DE PEDIDO</h2>
                <input type="text" id="track-name" class="search-bar" placeholder="INGRESA TU NOMBRE..." style="text-align:center; max-width:400px; border-color:#eee;">
                <button class="btn-acquire" style="margin-top:30px; max-width:300px; margin-left:auto; margin-right:auto;" onclick="trackingWa()">CONSULTAR WA</button>
            </div>
        </section>

        <section id="admin" class="container">
            <h2 style="font-family:var(--Cinzel); margin-bottom:40px">DASHBOARD MAESTRO</h2>
            <div id="adm-list"></div>
        </section>
    </main>

    <div class="nav-flotante">
        <button class="nav-item active" onclick="switchSection('shop', this)">Tienda</button>
        <button class="nav-item" onclick="switchSection('trace', this)">Rastreo</button>
        <button class="nav-item" id="nav-boss" style="display:none" onclick="switchSection('admin', this)">Panel</button>
    </div>

    <div class="modal" id="pay-modal">
        <div class="modal-inner">
            <h3 style="font-family:var(--Cinzel); letter-spacing:5px; margin-bottom:40px">SELECCIONA PAGO</h3>
            <div class="method-luxe" onclick="finalizeWA('YAPPY')">01. YAPPY</div>
            <div class="method-luxe" onclick="finalizeWA('ACH')">02. TRANSFERENCIA</div>
            <div class="method-luxe" onclick="finalizeWA('EFECTIVO')">03. EFECTIVO</div>
            <button class="btn-acquire" style="background:#ff4d4d; margin-top:20px;" onclick="closeM()">CANCELAR</button>
        </div>
    </div>

    <button class="fab-master" id="fab" onclick="addP()">+</button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        // [LÍNEA 365] CONFIGURACIÓN CORPORATIVA
        const firebaseConfig = {
            apiKey: "AIzaSyBkNAkJXoyxn9rkGv1mG5GPh9ge4FUjp8Y",
            authDomain: "essencev2.firebaseapp.com",
            projectId: "essencev2",
            storageBucket: "essencev2.firebasestorage.app",
            messagingSenderId: "201967001425",
            appId: "1:201967001425:web:0a072cd4d2048e7a0dbd70"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const BOSS_TEL = "50769028805";
        let tmpP = ""; let tmpV = "";

        // [LÍNEA 385] MOTOR DE CARGA CON SEDA
        onSnapshot(collection(db, "inventario_oficial"), (snap) => {
            const grid = document.getElementById('main-injector');
            const adm = document.getElementById('adm-list');
            grid.innerHTML = ""; adm.innerHTML = "";
            snap.forEach(d => {
                const item = d.data();
                // CARD CON EFECTO DE CASCADA
                grid.innerHTML += `
                    <div class="card" data-search="${item.name.toLowerCase()}">
                        <div class="card-visuals"><img src="${item.img}"></div>
                        <div style="color:var(--accent); font-size:0.6rem; font-weight:700; letter-spacing:3px; text-transform:uppercase; margin-bottom:10px">ESSENCE</div>
                        <h3>${item.name}</h3>
                        <p>$${item.price}</p>
                        <button class="btn-acquire" onclick="openM('${item.name}', '${item.price}')">ADQUIRIR</button>
                    </div>`;
                
                adm.innerHTML += `<div style="background:#f4f4f4; padding:20px; border-radius:8px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                    <span><b>${item.name}</b> ($${item.price})</span><button onclick="killP('${d.id}')" style="color:red; border:none; background:none; font-weight:700">BORRAR</button>
                </div>`;
            });
        });

        // [LÍNEA 420] LÓGICA DE PAGO (ANTIBLOQUEO IPHONE v12.0)
        window.openM = (n, v) => { tmpP = n; tmpV = v; document.getElementById('pay-modal').style.display = 'flex'; };
        window.closeM = () => document.getElementById('pay-modal').style.display = 'none';

        window.finalizeWA = async (metodo) => {
            const user = localStorage.getItem('e_user_rel') || prompt("Tu nombre completo:");
            if(!user) return;
            const msg = `👑 *ORDEN ÉLITE*%0A%0A👤 *Cliente:* ${user}%0A📦 *Pieza:* ${tmpP}%0A💰 *Valor:* $${tmpV}%0A💳 *Pago:* ${metodo}`;
            const waUrl = `https://wa.me/${BOSS_TEL}?text=${msg}`;
            
            // DISPARO AGRESIVO PARA IPHONE
            window.location.href = waUrl; 

            // Registro en segundo plano
            await addDoc(collection(db, "ventas_essence"), { user, perfume: tmpP, metodo, ts: new Date() });
            localStorage.setItem('e_user_rel', user); // Guardamos para la próxima
            closeM();
        };

        // [LÍNEA 450] NAVEGACIÓN SMOOTH (TAB SWITCH)
        window.switchSection = (id, btn) => {
            // Suavizamos el cambio de tab
            document.querySelectorAll('.container').forEach(c => c.style.opacity = '0');
            setTimeout(() => {
                document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById(id).classList.add('active');
                btn.classList.add('active');
                setTimeout(() => document.getElementById(id).style.opacity = '1', 10);
            }, 300); // 300ms de seda entre secciones
        };

        window.filterSystem = () => {
            const val = document.getElementById('engine').value.toLowerCase();
            document.querySelectorAll('.card').forEach(c => c.style.display = c.dataset.search.includes(val) ? "block" : "none");
        };

        window.trackingWa = () => {
            const n = document.getElementById('track-name').value;
            if(n) window.open(`https://wa.me/${BOSS_TEL}?text=Rastreo%20de%20pedido%20para:%20${n}`);
        };

        // ADMIN TOOLS
        window.killP = (id) => confirm("¿ELIMINAR?") && deleteDoc(doc(db, "inventario_oficial", id));
        window.addP = async () => {
            const name = prompt("Nombre:"), price = prompt("Precio:"), img = prompt("URL Imagen:");
            if(name && price && img) await addDoc(collection(db, "inventario_oficial"), { name, price, img });
        };

        let admClicks = 0;
        document.getElementById('boss-trigger').onclick = () => {
            if(++admClicks >= 3) {
                if(prompt("MASTER KEY:") === "542497") {
                    document.getElementById('nav-boss').style.display = 'block';
                    document.getElementById('fab').style.display = 'flex';
                }
                admClicks = 0;
            }
        };
    </script>
</body>
</html>
