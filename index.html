<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ESSENCE | PREMIUM</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --birri-red: #ff2d2d;
            --birri-bg: #f2f2f7;
            --card-white: #ffffff;
            --text-main: #1c1c1e;
            --shadow-soft: 0 4px 20px rgba(0,0,0,0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--birri-bg); font-family: 'Montserrat', sans-serif; color: var(--text-main); line-height: 1.4; }

        /* HEADER CLEAN */
        header {
            background: var(--card-white); padding: 20px; text-align: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .logo { font-weight: 900; font-size: 1.4rem; letter-spacing: 6px; text-transform: uppercase; color: #000; }

        /* CONTAINER CENTRALIZADO */
        .app-width { max-width: 500px; margin: 0 auto; padding: 20px; }

        /* BANNER PROMO (ESTILO BIRRIAPP) */
        .promo-banner {
            background: linear-gradient(135deg, #ff2d2d 0%, #d41414 100%);
            border-radius: 20px; padding: 30px 20px; color: #fff; margin-bottom: 25px;
            text-align: center; box-shadow: 0 10px 25px rgba(255, 45, 45, 0.25);
        }
        .promo-banner h2 { font-size: 1.8rem; font-weight: 900; margin-bottom: 5px; }
        .promo-banner p { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }

        /* CATEGORÍAS (PILLS) */
        .categories { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0 25px 0; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .category {
            background: #fff; padding: 12px 22px; border-radius: 50px; font-weight: 700;
            font-size: 0.75rem; white-space: nowrap; color: #8e8e93; border: 1px solid rgba(0,0,0,0.05);
            box-shadow: var(--shadow-soft); transition: var(--transition); cursor: pointer;
        }
        .category.active { background: #000; color: #fff; border-color: #000; }

        /* SEARCH BAR */
        .search-box { margin-bottom: 25px; }
        .search-input {
            width: 100%; padding: 16px 20px; border: none; border-radius: 15px;
            background: #fff; font-size: 0.95rem; font-weight: 500; outline: none;
            box-shadow: var(--shadow-soft); transition: var(--transition);
        }
        .search-input:focus { transform: scale(0.98); }

        /* GRID DE PRODUCTOS (CARDS BIRRI) */
        .product-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .product-card {
            background: var(--card-white); border-radius: 22px; padding: 20px;
            box-shadow: var(--shadow-soft); border: 1px solid rgba(0,0,0,0.02);
            display: flex; gap: 20px; align-items: center; transition: var(--transition);
        }
        .product-card:active { transform: scale(0.97); }
        .product-image { width: 100px; height: 100px; object-fit: contain; border-radius: 15px; }
        .product-info { flex: 1; }
        .product-info h3 { font-size: 1rem; font-weight: 800; margin-bottom: 4px; }
        .product-desc { font-size: 0.75rem; color: #8e8e93; margin-bottom: 12px; font-weight: 500; }
        .product-price { font-size: 1.3rem; font-weight: 900; color: var(--birri-red); }

        /* BOTÓN ¡LO QUIERO! (RED BIRRI) */
        .btn-toy {
            background: var(--birri-red); color: #fff; border: none; padding: 12px 18px;
            border-radius: 12px; font-size: 0.8rem; font-weight: 900; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;
            width: 100%; box-shadow: 0 4px 12px rgba(255, 45, 45, 0.2);
        }

        /* NAVEGACIÓN INFERIOR (ESTILO NATIVO) */
        .nav-dock {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-radius: 100px; padding: 10px; display: flex; justify-content: space-around;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05); z-index: 5000;
        }
        .nav-item {
            padding: 12px 25px; border-radius: 50px; border: none; background: transparent;
            font-size: 0.7rem; font-weight: 800; color: #a0a0a0; text-transform: uppercase;
        }
        .nav-item.active { background: #000; color: #fff; }

        /* RASTREO SECTION */
        .track-section { background: #fff; border-radius: 22px; padding: 30px 20px; box-shadow: var(--shadow-soft); text-align: center; }
        .track-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 15px; font-size: 1rem; text-align: center; }

        /* MODAL (SHEET STYLE) */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); z-index: 6000; align-items: flex-end; }
        .modal.open { display: flex; }
        .modal-content {
            background: #fff; width: 100%; border-radius: 30px 30px 0 0; padding: 40px 25px;
            text-align: center; animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        @media (max-width: 400px) {
            .product-card { flex-direction: column; text-align: center; }
            .product-image { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>

    <header><div class="logo">ESSENCE</div></header>

    <main class="app-width">
        <div id="shop-view">
            <div class="promo-banner">
                <p>OFERTA DE TEMPORADA</p>
                <h2>2 x $120.00</h2>
            </div>

            <div class="categories">
                <div class="category active">Todos</div>
                <div class="category">Dama</div>
                <div class="category">Caballero</div>
                <div class="category">Unisex</div>
            </div>

            <div class="search-box">
                <input type="text" class="search-input" id="search" placeholder="Busca tu perfume favorito..." onkeyup="filter()">
            </div>

            <div class="product-grid" id="product-list">
                </div>
        </div>

        <div id="track-view" style="display: none; padding-top: 20px;">
            <div class="track-section">
                <h3 style="margin-bottom: 15px; font-weight: 800;">RASTREA TU PEDIDO</h3>
                <input type="text" class="track-input" id="track-id" placeholder="Ingresa tu nombre o ID">
                <button class="btn-toy" style="background: #000;" onclick="trackOrder(event)">Consultar Estado</button>
                <div id="track-result" style="margin-top: 20px; font-weight: 600; color: #ff2d2d;"></div>
            </div>
        </div>
    </main>

    <nav class="nav-dock">
        <button class="nav-item active" id="nav-home">Inicio</button>
        <button class="nav-item" id="nav-track">Rastreo</button>
    </nav>

    <div class="modal" id="p-modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 25px; font-weight: 900;">¿CÓMO DESEAS PAGAR?</h3>
            <button class="btn-toy" style="background:#000; margin-bottom:12px;" onclick="pay('YAPPY')">YAPPY</button>
            <button class="btn-toy" style="background:#0066ff; margin-bottom:12px;" onclick="pay('ACH')">TRANSFERENCIA</button>
            <button class="btn-toy" style="background:#eee; color:#000; box-shadow:none;" onclick="closeM()">CANCELAR</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";

        const config = {
            apiKey: "AIzaSyBkNAkJXoyxn9rkGv1mG5GPh9ge4FUjp8Y",
            authDomain: "essencev2.firebaseapp.com",
            projectId: "essencev2",
            storageBucket: "essencev2.firebasestorage.app",
            messagingSenderId: "201967001425",
            appId: "1:201967001425:web:0a072cd4d2048e7a0dbd70"
        };

        const app = initializeApp(config);
        const db = getFirestore(app);
        let currentN = "", currentP = "";

        // CARGA DE PRODUCTOS
        onSnapshot(collection(db, "inventario_oficial"), (snap) => {
            const list = document.getElementById('product-list');
            list.innerHTML = "";
            snap.forEach(doc => {
                const i = doc.data();
                list.innerHTML += `
                    <div class="product-card" data-name="${i.name.toLowerCase()}" data-cat="${i.cat || ''}">
                        <img src="${i.img}" class="product-image">
                        <div class="product-info">
                            <h3>${i.name}</h3>
                            <div class="product-desc">${i.desc || 'Fragancia Original'}</div>
                            <span class="product-price">$${i.price}</span>
                            <button class="btn-toy" onclick="openM('${i.name}', '${i.price}')">¡LO QUIERO!</button>
                        </div>
                    </div>`;
            });
        });

        // LÓGICA DE COMPRA
        window.openM = (n, p) => { currentN = n; currentP = p; document.getElementById('p-modal').classList.add('open'); };
        window.closeM = () => document.getElementById('p-modal').classList.remove('open');
        
        window.pay = async (m) => {
            const u = prompt("Dinos tu nombre para confirmar:");
            if(!u) return;
            window.open(`https://wa.me/50769028805?text=🔥 NUEVA ORDEN%0ACliente: ${u}%0APerfume: ${currentN}%0APago: ${m}`);
            await addDoc(collection(db, "ventas_essence"), { cliente: u, perfume: currentN, pago: m, fecha: new Date() });
            closeM();
        };

        // FILTROS
        window.filter = () => {
            const v = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.product-card').forEach(c => {
                c.style.display = c.dataset.name.includes(v) ? "flex" : "none";
            });
        };

        // NAVEGACIÓN
        document.getElementById('nav-home').onclick = () => {
            document.getElementById('shop-view').style.display = 'block';
            document.getElementById('track-view').style.display = 'none';
            document.getElementById('nav-home').classList.add('active');
            document.getElementById('nav-track').classList.remove('active');
        };
        document.getElementById('nav-track').onclick = () => {
            document.getElementById('shop-view').style.display = 'none';
            document.getElementById('track-view').style.display = 'block';
            document.getElementById('nav-home').classList.remove('active');
            document.getElementById('nav-track').classList.add('active');
        };

        // RASTREO REAL
        window.trackOrder = async function(e) {
            const id = document.getElementById('track-id').value.trim();
            const result = document.getElementById('track-result');
            if(!id) return;
            result.textContent = 'Buscando pedido...';
            const q = query(collection(db, "ventas_essence"), where("cliente", "==", id));
            const snap = await getDocs(q);
            if(snap.empty) {
                result.textContent = 'No se encontró pedido. Verifica el nombre.';
            } else {
                let info = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    info += `✅ ${d.perfume} - En proceso`;
                });
                result.textContent = info;
            }
        }
    </script>
</body>
</html>
